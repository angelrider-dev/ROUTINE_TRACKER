name: routine_tracker
description: A daily routine and habit tracker app.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Local database (offline-first)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.3
  path: ^1.9.0

  # Notifications
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4
  flutter_timezone: ^5.0.2

  # Charts / calendar heatmap
  table_calendar: ^3.1.2
  fl_chart: ^0.68.0

  # Icons: using Flutter's built-in Icons (Material Symbols) instead of a
  # third-party icon package — see README.md for why.

  # Settings screen: theme persistence + app version display
  shared_preferences: ^2.2.3
  package_info_plus: ^8.0.0

  # Data export: hands the exported file to the OS share sheet
  share_plus: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true
